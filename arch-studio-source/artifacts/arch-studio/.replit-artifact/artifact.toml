kind = "web"
previewPath = "/"
title = "Architecture Studio"
version = "1.0.0"
id = "artifacts/arch-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18987

[services.development]
run = "pnpm --filter @workspace/arch-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arch-studio", "run", "build" ]
publicDir = "artifacts/arch-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18987"
BASE_PATH = "/"
